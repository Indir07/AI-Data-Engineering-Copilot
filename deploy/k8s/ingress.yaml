# Illustrative ingress: UI at /, API at /api (adjust host + ingress class).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: copilot
  namespace: copilot
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: copilot.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: copilot-api
                port: { number: 80 }
          - path: /
            pathType: Prefix
            backend:
              service:
                name: copilot-ui
                port: { number: 80 }
