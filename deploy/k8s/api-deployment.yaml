# STUB — illustrative only (see deploy/k8s/README.md).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: copilot-api
  labels: { app: copilot, component: api }
spec:
  replicas: 2
  selector:
    matchLabels: { app: copilot, component: api }
  template:
    metadata:
      labels: { app: copilot, component: api }
    spec:
      containers:
        - name: api
          image: ghcr.io/indir07/ai-data-engineering-copilot:latest
          command: ["uvicorn", "copilot.presentation.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - containerPort: 8000
          env:
            - name: APP_ENV
              value: "prod"
            - name: RUN_MIGRATIONS
              value: "1"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef: { name: copilot-secrets, key: database-url }
            - name: OLLAMA_BASE_URL
              value: "http://ollama:11434"
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits: { cpu: "1", memory: "1Gi" }
---
apiVersion: v1
kind: Service
metadata:
  name: copilot-api
spec:
  selector: { app: copilot, component: api }
  ports:
    - port: 80
      targetPort: 8000
